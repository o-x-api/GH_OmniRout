version: '3.8'

services:
  omniroute:
    # Use the official pre-built production docker image
    image: diegosouzapw/omniroute:latest
    restart: always
    environment:
      # Pass your write-access Hugging Face token here
      - HF_TOKEN=hf_YOUR_ACTUAL_TOKEN_HERE
      # Name your custom repository (e.g., username/my-custom-dataset)
      - HF_DATASET_NAME=your-username/your-custom-dataset-name
      # Core application mapping configurations
      - OMNIROUT_DATA_DIR=/app/data
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # Mount the entrypoint.py file from your repository into the container
      - ./entrypoint.py:/app/entrypoint.py:ro
      # Keeps a persistent copy locally on your machine as a fallback
      - omniroute_local_state:/app/data
    # Force the pre-built image to execute our sync logic instead of booting blind
    entrypoint: ["python3", "/app/entrypoint.py"]

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    environment:
      # Paste your secure token generated from your Cloudflare Zero Trust Dashboard
      - TUNNEL_TOKEN=ey_YOUR_CLOUDFLARE_TUNNEL_TOKEN_HERE
    command: tunnel run
    depends_on:
      - omniroute

volumes:
  omniroute_local_state:
